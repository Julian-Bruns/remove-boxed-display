<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT Math Normalizer Visual Fixture</title>
    <link rel="stylesheet" href="/vendor/katex/katex.min.css">
    <link rel="stylesheet" href="/content.css">
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050505;
        color: #f4f4f4;
      }

      body {
        margin: 0;
        background: #050505;
      }

      main {
        box-sizing: border-box;
        width: min(920px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 56px 0 160px;
      }

      article {
        font-size: 20px;
        line-height: 1.55;
        margin: 0 0 28px;
      }

      p {
        margin: 0 0 12px;
      }

      .katex-display {
        margin: 0.5em 0;
      }

      [data-case="complex-before"] {
        margin-bottom: 8px;
      }

      .fixture-label {
        color: #9b9b9b;
        font-size: 13px;
        margin-bottom: 8px;
      }
    </style>
    <script src="/vendor/katex/katex.min.js"></script>
  </head>
  <body>
    <main id="conversation" aria-label="Fixture conversation"></main>

    <script>
      (() => {
        const conversation = document.getElementById("conversation");
        const monSupp =
          "\\operatorname{MonSupp}^{\\circ}_{\\ell}(C)=\\left\\{[H] : H=\\overline{\\rho(\\pi_1(C'))}^{\\mathrm{Zar},\\circ}\\text{ for some finite etale }C'\\to C\\right\\}";

        function inlineMath(tex) {
          return katex.renderToString(tex, {
            displayMode: false,
            throwOnError: true,
            strict: "ignore",
            trust: false
          });
        }

        function displayMath(tex, attributes) {
          return katex
            .renderToString(tex, {
              displayMode: true,
              throwOnError: true,
              strict: "ignore",
              trust: false
            })
            .replace('class="katex-display"', `class="katex-display" ${attributes || ""}`);
        }

        window.cgmnLoadTranscript = ({ rows = 180 } = {}) => {
          conversation.textContent = "";
          conversation.insertAdjacentHTML(
            "beforeend",
            `
              <article data-message-author-role="assistant" data-case="simple-flow">
                <div class="fixture-label">simple display must become true inline</div>
                <p data-case="simple-before">For</p>
                ${displayMath("g_B \\ge 2", 'data-case="simple-display"')}
                <p data-case="simple-after">you only need g_B.</p>
              </article>

              <article data-message-author-role="assistant" data-case="boxed-flow">
                <div class="fixture-label">boxed inline must render unboxed and copy unboxed TeX</div>
                <p data-case="boxed">The copied result is ${inlineMath("\\boxed{a+b}")} and should not include boxed.</p>
              </article>

              <article data-message-author-role="assistant" data-case="complex-flow">
                <div class="fixture-label">large structured display must remain display math</div>
                <p data-case="complex-before">A useful set-valued invariant is:</p>
                ${displayMath(monSupp, 'data-case="complex-display"')}
                <p data-case="complex-after">Here rho ranges over continuous semisimple representations.</p>
              </article>
            `
          );

          let repeated = "";
          for (let index = 0; index < rows; index += 1) {
            repeated += `
              <article data-message-author-role="assistant" data-case="scroll-row">
                <p>For row ${index}</p>
                ${displayMath(`x_{${index}} \\to y_{${index}}`, 'data-case="scroll-display"')}
                <p>the map should stay inline while scrolling through the transcript.</p>
              </article>
            `;
          }

          conversation.insertAdjacentHTML("beforeend", repeated);
          window.cgmnFixtureGenerated = true;
        };
      })();
    </script>
    <script src="/extension-api.js"></script>
    <script src="/tex-normalizer.js"></script>
    <script src="/math-display-policy.js"></script>
    <script src="/content.js"></script>
  </body>
</html>
